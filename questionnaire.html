<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learney</title>
    <link rel="stylesheet" href="./resources/styles/qStyles.css" type="text/css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Orbitron:wght@400..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body id="questionnaire">
    <main>
    <section id="home" class="hidden display">
        <div class="container" id="intro">
            <h1 data-i18n="q_welcome_h1"></h1>
            <p data-i18n="q_introText"></p>
            <h2 data-i18n="q_motto_h2"></h2>

        </div>
        <div class="container" id="begin">
            <h1 data-i18n="q_ready"></h1>
        </div>
    </section>
    <section id="subjects" class="hidden">
        <div id="subjectsDiv">
            <h1 data-i18n="sub_letsGo"></h1>
            <h2 data-i18n="sub_studyFor"></h2>
            <input type="text" id="subjectInput" data-i18n-placeholder="enter_sub" list="subjectOptions">
<!--            <label for="subjectInput">Fach eingeben</label>-->
            <datalist id="subjectOptions">
                <option data-i18n-value="val_physics"></option>
                <option data-i18n-value="val_maths"></option>
                <option data-i18n-value="val_english"></option>
                <option data-i18n-value="val_latin"></option>
                <option data-i18n-value="val_french"></option>
                <option data-i18n-value="val_german"></option>
                <option data-i18n-value="val_chemistry"></option>
                <option data-i18n-value="val_biology"></option>
                <option data-i18n-value="val_history"></option>
                <option data-i18n-value="val_geography"></option>
                <option data-i18n-value="val_computer"></option>
                </datalist>
            <button id="addSubjectButton" data-i18n="add_subject"></button>
            <ul id="subjectList">

            </ul>
            <!--<h2>Alles klar!</h2>-->
        </div>
    </section>
    <section id="dates" class="hidden">
        <div id="dateDiv">
            <h1 data-i18n="add_date"></h1>
            <h1 id="dateProgress"></h1>
            <h3 data-i18n="date_when_h3"></h3>
            <h2 id="currentDateSubject"></h2>
            <input type="date" id="dateInput">
            <!--<label for="dateInput">Datum eingeben</label>-->
        </div>
    </section>
    <section id="confidence" class="hidden">
        <h2 data-i18n="know_already"></h2>
        <div id="sliderDiv">

        </div>
    </section>
    <section id="time" class="hidden">
        <h1 data-i18n="how_often"></h1>
        <label for="1everyDay">
            <input type="radio" id="1everyDay" value="1" name="days">
            <span data-i18n="every_day"></span>
        </label>
        <label for="2everyOther">
            <input type="radio" id="2everyOther" value="2" name="days" checked>
            <span data-i18n="other_day"></span>
        </label>
        <label for="3everyThird">
            <input type="radio" id="3everyThird" value="3" name="days">
            <span data-i18n="third_day"></span>
        </label>
        <h1 data-i18n="time_per_day"></h1>
        <label for="hoursPerDay">
            <input id="hoursPerDay" type="number" min="0" max="3" value="0">
            h
        </label>
        <label for="minsPerDay">
            <input id="minsPerDay" type="number" min="0" max="45" step="15" value="30">
            mins
        </label>

    </section>
    <section id="summarize" class="hidden">
        <h1 data-i18n="correct_h1"></h1>
        <div id="summarizeDiv"></div>
    </section>
    <section id="wait" class="hidden">
        <h2 data-i18n="wait_moment"></h2>
        <h1 data-i18n="wait_prepare"></h1>
    </section>
</main>
    <div id="navDiv" class="display hidden">
        <button id="backButton" class="hidden" data-i18n="back_button"></button>
        <button id="continueButton" data-i18n="continue_button"></button>
        <button id="leaveButton" class="hidden" data-i18n="leave_button"></button>
    </div>


    <script src="./resources/scripts/translationScript.js"></script>
    <script src="./resources/scripts/qScript.js"></script>
</body>
</html>
