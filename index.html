<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Quidey</title>
        <!--<link rel="manifest" href="./resources/JSON/manifest.json">-->
        <link rel="icon" type="image/x-icon" href="./resources/images/favicon_io/favicon-32x32.png">
        <link rel="apple-touch-icon" href="./resources/images/favicon_io/favicon-32x32.png">
        <link href="./resources/styles/newStyles.css" rel="stylesheet" type="text/css">
        <link rel="stylesheet" href="./resources/styles/colorStyles.css" type="text/css">
        <link rel="stylesheet" href="./resources/styles/menuStyles.css" type="text/css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Orbitron:wght@400..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <header>
            <section id="menuIcon">
                <svg id="menuIconImg" xmlns="http://www.w3.org/2000/svg" height="48px" viewBox="0 -960 960 960" width="48px"><path fill="currentColor" d="M150-240q-12.75 0-21.37-8.68-8.63-8.67-8.63-21.5 0-12.82 8.63-21.32 8.62-8.5 21.37-8.5h660q12.75 0 21.38 8.68 8.62 8.67 8.62 21.5 0 12.82-8.62 21.32-8.63 8.5-21.38 8.5H150Zm0-210q-12.75 0-21.37-8.68-8.63-8.67-8.63-21.5 0-12.82 8.63-21.32 8.62-8.5 21.37-8.5h660q12.75 0 21.38 8.68 8.62 8.67 8.62 21.5 0 12.82-8.62 21.32-8.63 8.5-21.38 8.5H150Zm0-210q-12.75 0-21.37-8.68-8.63-8.67-8.63-21.5 0-12.82 8.63-21.32 8.62-8.5 21.37-8.5h660q12.75 0 21.38 8.68 8.62 8.67 8.62 21.5 0 12.82-8.62 21.32-8.63 8.5-21.38 8.5H150Z"/></svg>
            </section>
            <h1 id="headerH1">Quidey</h1>
            <section id="profileIcon">
                <svg id="profileIconImg" xmlns="http://www.w3.org/2000/svg" height="48px" viewBox="0 -960 960 960" width="48px" fill="currentColor"><path d="M222-255q63-44 125-67.5T480-346q71 0 133.5 23.5T739-255q44-54 62.5-109T820-480q0-145-97.5-242.5T480-820q-145 0-242.5 97.5T140-480q0 61 19 116t63 109Zm160.5-234.5Q343-529 343-587t39.5-97.5Q422-724 480-724t97.5 39.5Q617-645 617-587t-39.5 97.5Q538-450 480-450t-97.5-39.5ZM480-80q-82 0-155-31.5t-127.5-86Q143-252 111.5-325T80-480q0-83 31.5-155.5t86-127Q252-817 325-848.5T480-880q83 0 155.5 31.5t127 86q54.5 54.5 86 127T880-480q0 82-31.5 155t-86 127.5q-54.5 54.5-127 86T480-80Zm107.5-76Q640-172 691-212q-51-36-104-55t-107-19q-54 0-107 19t-104 55q51 40 103.5 56T480-140q55 0 107.5-16Zm-52-375.5Q557-553 557-587t-21.5-55.5Q514-664 480-664t-55.5 21.5Q403-621 403-587t21.5 55.5Q446-510 480-510t55.5-21.5ZM480-587Zm0 374Z"/></svg>
            </section>
        </header>
        <main>
            <div id="div1" class="hidden">
                <h2 id="timerTime"><span id="timerMins">25</span>:<span id="timerSecs">00</span></h2>
                <div id="progressBar">
                    <div id="progressor"></div>
                </div>
                <!--<button id="timerStartStop">Timer</button> -->
            </div>
            <div id="div2" class="hidden">
                <!--
                <h1 data-i18n="new_progress_h1"></h1>
                <div id="progressBar">
                    <div id="progressor"></div>
                </div>
                -->
                <h2 id="stateH1"></h2>
            </div>
            <div id="div3">
                <h2 id="dateH1"></h2>
                <h2 id="timeH1"></h2>
            </div>
            <div id="div4"><!--
                <h2 data-i18n="new_session"></h2>
                <div id="newEnergy">
                    <h2 data-i18n="energy_h2"></h2>
                    <input type="range" id="energyInput" min="1" max="100" step="1"></input>
                </div>-->
                <div id="newTime">
                    <h2 data-i18n="time_h2"></h2>
                    <div id="hAndMin">
                        <!--<h5 data-i18n="hour_label"></h5>-->
                        <input type="number" id="sessionHourInput" min="0" max="03" step="1" value="0"></input>
                        <!--<h5 data-i18n="min_label"></h5>-->
                        <span> : </span>
                        <input type="number" id="sessionMinInput" min="0" max="45" step="15" value="30"></input>
                    </div>
                    <h4 data-i18n="session_length_label"></h4>
                    <div id="sessLengthDiv">
                        <input type="number" id="sessionLengthInput" min="15" max="45" step="5" value="30"></input>
                        <h5 data-i18n="min_label"></h5>
                    </div>
                    <h4 data-i18n="include_breaks"></h4>
                    <div id="breakRadioDiv">
                        <div id="breaksYesDiv">
                            <input type="radio" id="breaksYes" name="breaks" value="yes" checked></input>
                            <label id="breaksYesLabel" for="breaksYes" data-i18n="yes"></label>
                        </div>
                        <div id="breaksNoDiv">
                            <input type="radio" id="breaksNo" name="breaks" value="no" data-i18n="no"></input>
                            <label id="breaksNoLabel" for="breaksNo" data-i18n="no"></label>
                        </div>
                    </div>
                </div>
                <button id="startSession" data-i18n="start_session"></button>
            </div>
            <div id="div5">
                <h2 id="addSub" data-i18n="new_add_sub"></h2>
                <input type="text" id="subjectInput" data-i18n-placeholder="enter_sub" list="subjectOptions">
                <datalist id="subjectOptions">
                    <option data-i18n-value="val_physics"></option>
                    <option data-i18n-value="val_maths"></option>
                    <option data-i18n-value="val_english"></option>
                    <option data-i18n-value="val_latin"></option>
                    <option data-i18n-value="val_french"></option>
                    <option data-i18n-value="val_german"></option>
                    <option data-i18n-value="val_chemistry"></option>
                    <option data-i18n-value="val_biology"></option>
                    <option data-i18n-value="val_history"></option>
                    <option data-i18n-value="val_geography"></option>
                    <option data-i18n-value="val_computer"></option>
                </datalist>

                <input type="date" id="dateInput" data-i18n-placeholder="ddmmyy">
                <label for="confidenceInput" data-i18n="sum_know"></label>
                <input type="range" id="confidenceInput" min="1" max="5" value="3">
                <button id="addNewSub" data-i18n="new_add"></button>
            </div>
            <div id="div6">
                <svg xmlns="http://www.w3.org/2000/svg" id="expandSubList" height="48px" viewBox="0 -960 960 960" width="48px" fill="currentColor"><path d="M260-260h150q12.75 0 21.38 8.68 8.62 8.67 8.62 21.5 0 12.82-8.62 21.32-8.63 8.5-21.38 8.5H230q-12.75 0-21.37-8.63Q200-217.25 200-230v-180q0-12.75 8.68-21.38 8.67-8.62 21.5-8.62 12.82 0 21.32 8.62 8.5 8.63 8.5 21.38v150Zm440-440H550q-12.75 0-21.37-8.68-8.63-8.67-8.63-21.5 0-12.82 8.63-21.32 8.62-8.5 21.37-8.5h180q12.75 0 21.38 8.62Q760-742.75 760-730v180q0 12.75-8.68 21.37-8.67 8.63-21.5 8.63-12.82 0-21.32-8.63-8.5-8.62-8.5-21.37v-150Z"/></svg>
                <h2 data-i18n="your_subs"></h2>
                <div id="subUlDiv">
                    <ul id="subUl">

                    </ul>
                </div>
            </div>
            <div id="div6extended" class="hidden">
                <svg xmlns="http://www.w3.org/2000/svg" id="collapseSubList" height="48px" viewBox="0 -960 960 960" width="48px" fill="currentColor"><path d="M380-380H230q-12.75 0-21.37-8.68-8.63-8.67-8.63-21.5 0-12.82 8.63-21.32 8.62-8.5 21.37-8.5h180q12.75 0 21.38 8.62Q440-422.75 440-410v180q0 12.75-8.68 21.37-8.67 8.63-21.5 8.63-12.82 0-21.32-8.63-8.5-8.62-8.5-21.37v-150Zm200-200h150q12.75 0 21.38 8.68 8.62 8.67 8.62 21.5 0 12.82-8.62 21.32-8.63 8.5-21.38 8.5H550q-12.75 0-21.37-8.63Q520-537.25 520-550v-180q0-12.75 8.68-21.38 8.67-8.62 21.5-8.62 12.82 0 21.32 8.62 8.5 8.63 8.5 21.38v150Z"/></svg>
                <h2 data-i18n="your_subs" id="extendedSubsH2"></h2>
                <div id="subUlDivExtended"  class="tgContainer">

                </div>
            </div>
            <div id="div7" class="hidden">
                <h3 data-i18n="current_task"></h3>
                <h2 id="currentTask"><h2>
                <button id="nextSession" data-i18n="next_session"></button>
                <button id="endSession" data-i18n="end_session"></button>
                <button id="skipSession" data-i18n="skip_session" class="hidden"></button>
            </div>
            <div id="div8" class="hidden">
                <h2 data-i18n="session_sub_tasks"></h2>
                <div id="subTaskList"  class="tgContainer">

                </div>
                <!--<div id="inSessionTaskAdder">
                    <svg xmlns="http://www.w3.org/2000/svg" height="48px" viewBox="0 -960 960 960" width="48px" fill="current color"><path d="M450-450H200v-60h250v-250h60v250h250v60H510v250h-60v-250Z"/></svg>
                </div>-->
            </div>
            
        </main>
        <div id="alertDiv" class="hidden">
            <div id="innerAlertDiv">
                <h2 id="alertH2"></h2>
                <button id="alertOkButton">OK</button>
            </div>
        </div>

        <div id="temporaryDivContainer">

        </div>
        
        <script src="./resources/scripts/translationScript.js"></script>
        <script src="./resources/scripts/colorScript.js"></script>
        <script src="./resources/scripts/menuScript.js"></script>
        <script type="module" src="./resources/scripts/newScript.js"></script>
    </body>
</html>
